<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xsis9</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #fff;
      padding: 20px;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .bio {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 48px;
      text-align: center;
    }
    .links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 24px 48px;
      text-decoration: none;
      color: #fff;
      font-size: 18px;
      font-weight: 500;
      transition: all 0.3s ease;
      min-width: 140px;
      text-align: center;
    }
    .card:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }
    footer {
      position: fixed;
      bottom: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="avatar">X</div>
  <p class="bio">记录学习与生活的点点滴滴</p>
  <div class="links">
    <a href="/MyNote/" class="card">笔记</a>
    <a href="/game" class="card">游戏</a>
    <a href="/fun" class="card">娱乐</a>
  </div>
  <footer>© 2026 xsis9</footer>
</body>
</html>
